<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meet Split for Broadcast</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      margin: 0;
      padding: 14px;
      background: #1a1a1a;
      color: #e8e8e8;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 2px 0;
      color: #fff;
    }
    .subtitle {
      font-size: 11px;
      color: #999;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    button {
      padding: 9px 12px;
      background: #2d7ff9;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      flex: 1;
    }
    button:hover { background: #1a6fe3; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    button.cam { background: #2d7ff9; }
    button.cam:hover { background: #1a6fe3; }
    button.slides { background: #4caf50; }
    button.slides:hover { background: #3e9f43; }
    button.toggle-on { background: #ff5722; }
    button.toggle-on:hover { background: #e64a19; }
    button.toggle-off { background: #888; }
    button.toggle-off:hover { background: #666; }
    button.secondary { background: #3a3a3a; flex: none; padding: 6px 10px; font-size: 11px; }
    button.secondary:hover { background: #4a4a4a; }
    .pill {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 3px;
      background: #333;
      color: #999;
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: ui-monospace, "Cascadia Code", monospace;
    }
    .pill.marked { background: #1f4a1f; color: #8fd48f; }
    .pill.cam-marked { background: #1a3a5a; color: #87b9ed; }
    .divider {
      border: none;
      border-top: 1px solid #333;
      margin: 12px 0;
    }
    #toggle-row { margin-top: 10px; }
    #status {
      margin-top: 10px;
      padding: 8px;
      background: #0d0d0d;
      border-radius: 4px;
      font-size: 11px;
      color: #aaa;
      min-height: 18px;
      white-space: pre-wrap;
      font-family: ui-monospace, "Cascadia Code", monospace;
    }
    details {
      margin-top: 10px;
      font-size: 11px;
      color: #777;
    }
    details summary { cursor: pointer; padding: 4px 0; }
    details .debug-buttons {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    #fallback {
      display: none;
      width: 100%;
      height: 110px;
      margin-top: 8px;
      background: #0d0d0d;
      color: #e8e8e8;
      border: 1px solid #333;
      border-radius: 4px;
      font-family: ui-monospace, "Cascadia Code", monospace;
      font-size: 10px;
      padding: 6px;
      box-sizing: border-box;
    }
    .hint {
      font-size: 10px;
      color: #ff9800;
      line-height: 1.4;
      margin: 4px 0 8px 0;
      padding: 6px;
      background: rgba(255, 152, 0, 0.1);
      border-radius: 3px;
    }
    .hint.hidden { display: none; }
    #warnings {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #warnings:empty { display: none; }
    .warning {
      font-size: 11px;
      color: #ffb74d;
      line-height: 1.4;
      padding: 8px 10px;
      background: rgba(255, 152, 0, 0.12);
      border-left: 3px solid #ff9800;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Meet Split for Broadcast</h1>
  <div class="subtitle">v0.1.1 - layout warnings</div>

  <div class="row">
    <button type="button" id="btn-mark-cam" class="cam">Marcar CAM</button>
    <span id="pill-cam" class="pill">nao marcado</span>
  </div>

  <div class="row">
    <button type="button" id="btn-mark-slides" class="slides">Marcar SLIDES</button>
    <span id="pill-slides" class="pill">nao marcado</span>
  </div>

  <div class="hint hidden" id="selection-hint">
    Modo selecao ativo - clique no tile desejado dentro do Meet.
  </div>

  <div id="toggle-row" class="row">
    <button type="button" id="btn-toggle-split" class="toggle-off">Ativar Split</button>
  </div>

  <hr class="divider">

  <div class="row">
    <button type="button" id="btn-clear" class="secondary">Limpar selecoes</button>
    <button type="button" id="btn-refresh" class="secondary">Atualizar</button>
  </div>

  <div id="status">Carregando...</div>
  <div id="warnings"></div>

  <details>
    <summary>Debug</summary>
    <div class="debug-buttons">
      <button type="button" id="btn-inspect" class="secondary">Inspecionar DOM</button>
      <button type="button" id="btn-ping" class="secondary">Ping</button>
    </div>
    <textarea id="fallback" readonly></textarea>
  </details>

  <script src="popup.js"></script>
</body>
</html>
